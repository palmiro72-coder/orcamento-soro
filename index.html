let cart=[],sup='phd',tab='ativos';
const TD={ativos:PA,vitaminas:PV,outros:PO,protocolos:PP};

function setSup(s){sup=s;document.querySelectorAll('.stab').forEach(t=>{t.className='stab';if(t.dataset.s===s)t.classList.add(s==='phd'?'ap':'af')});
if(s==='phd'){tab='ativos';rT(['ativos','vitaminas','outros','protocolos'])}else{tab='protocolos';rT(['protocolos'])}
document.getElementById('sI').value='';rCat()}

function rT(ts){document.getElementById('tC').innerHTML=ts.map(t=>`<div class="tab ${t===tab?'active':''}" data-t="${t}" onclick="sT('${t}')">${t[0].toUpperCase()+t.slice(1)}</div>`).join('')}

function sT(t){tab=t;document.querySelectorAll('.tab').forEach(e=>e.classList.toggle('active',e.dataset.t===t));document.getElementById('sI').value='';rCat()}

function rCat(){
const L=document.getElementById('cL'),q=document.getElementById('sI').value.toLowerCase().trim();
if(sup==='fm'){
const fl=FP.filter(p=>!q||p.n.toLowerCase().includes(q)||p.d.toLowerCase().includes(q)||String(p.c).includes(q));
L.innerHTML=fl.map(p=>`<div class="ci" onclick="aFM(${p.c})"><div><div class="n"><span class="dot df"></span>${p.n}</div><div class="d">Cód.${p.c} · ${p.k} · ${p.d}</div></div><div></div><button class="ab fm" onclick="event.stopPropagation();aFM(${p.c})">+</button></div>`).join('');
document.getElementById('iC').textContent=fl.length+' protocolos FM';return}
if(tab==='protocolos'){
const fl=PP.filter(p=>!q||p.n.toLowerCase().includes(q)||p.d.toLowerCase().includes(q)||String(p.c).includes(q));
L.innerHTML=fl.map(p=>`<div class="ci" onclick="aPP(${p.c})"><div><div class="n"><span class="dot dp"></span>${p.n}</div><div class="d">Cód.${p.c} · ${p.s}sess · ${p.d}</div></div><div style="text-align:right"><div class="p">${f(p.pr)}</div><div class="u">${p.s}sess</div></div><button class="ab" onclick="event.stopPropagation();aPP(${p.c})">+</button></div>`).join('');
document.getElementById('iC').textContent=fl.length+' proto PHD';return}
const data=TD[tab]||[];
const fl=data.filter(d=>!q||d.n.toLowerCase().includes(q)||String(d.c).includes(q)||d.v.toLowerCase().includes(q));
L.innerHTML=fl.map(d=>`<div class="ci"><div><div class="n"><span class="dot do"></span>${d.n}</div><div class="d">Cód.${d.c} · ${d.v} · ${d.a}</div></div><div style="text-align:right"><div class="p">${f(d.p)}</div><div class="u">/amp</div></div><button class="ab" onclick="aPHD(${d.c},'${tab}')">+</button></div>`).join('');
document.getElementById('iC').textContent=fl.length+' itens PHD'}

function aPHD(c,t){const d=TD[t],i=d.find(x=>x.c===c);if(!i)return;const e=cart.find(x=>x.c===c&&x.s==='phd'&&x.t==='u');if(e)e.q++;else cart.push({c,n:i.n,p:i.p,q:1,t:'u',s:'phd'});rC()}
function aPP(c){const i=PP.find(x=>x.c===c);if(!i)return;const e=cart.find(x=>x.c===c&&x.t==='p'&&x.s==='phd');if(e)e.q++;else cart.push({c,n:i.n,p:i.pr,q:1,t:'p',s:'phd',ss:i.s});rC()}
function aFM(c){const i=FP.find(x=>x.c===c);if(!i)return;const e=cart.find(x=>x.c===c&&x.s==='fm');if(e)e.q++;else cart.push({c,n:'[FM] '+i.n,p:0,q:1,t:'p',s:'fm',k:i.k,d:i.d});rC()}
function rm(i){cart.splice(i,1);rC()}
function cq(i,d){cart[i].q+=d;if(cart[i].q<=0)cart.splice(i,1);rC()}

function rC(){
const L=document.getElementById('cLi'),mk=parseFloat(document.getElementById('mI').value)||0;
if(!cart.length){L.innerHTML='<div class="ce"><div class="ic">💉</div>Selecione os ativos para compor o soro</div>';
document.getElementById('cC').textContent='0';document.getElementById('tCo').textContent='R$ 0,00';
document.getElementById('tA').textContent='0';document.getElementById('tP').textContent='R$ 0,00';return}
L.innerHTML=cart.map((c,i)=>`<div class="citem"><div><div class="cn">${c.n}<span class="sp ${c.s==='phd'?'phd':'fm'}">${c.s==='phd'?'PHD':'FM'}</span></div></div><div class="cp2">${c.p>0?f(c.p*c.q):'consultar'}</div><div class="qc"><button class="qb" onclick="cq(${i},-1)">−</button><span class="qv">${c.q}</span><button class="qb" onclick="cq(${i},1)">+</button></div><button class="rb" onclick="rm(${i})">✕</button></div>`).join('');
const tc=cart.reduce((s,c)=>s+c.p*c.q,0),ta=cart.reduce((s,c)=>s+c.q,0),tp=tc*(1+mk/100);
document.getElementById('cC').textContent=cart.length;document.getElementById('tCo').textContent=f(tc);
document.getElementById('tA').textContent=ta;document.getElementById('tP').textContent=tc>0?f(tp):'sob consulta'}

function showPrint(){
if(!cart.length)return;const mk=parseFloat(document.getElementById('mI').value)||0;
const pn=document.getElementById('pN').value||'—',dt=document.getElementById('bD').value||new Date().toISOString().split('T')[0];
const cl=document.getElementById('cS').value,vi=document.getElementById('vS').value;
const tc=cart.reduce((s,c)=>s+c.p*c.q,0),tp=tc*(1+mk/100),fd=dt.split('-').reverse().join('/');
const rows=cart.map(c=>`<tr><td>${c.n}</td><td style="text-align:center">${c.q}</td><td style="text-align:right">${c.p>0?f(c.p*c.q*(1+mk/100)):'consultar'}</td></tr>`).join('');
document.getElementById('pCo').innerHTML=`<h3>Orçamento de Soroterapia</h3><div class="cn2">${cl} · ${fd}</div><div style="margin-bottom:16px"><strong>Paciente:</strong> ${pn}<br><strong>Via:</strong> ${vi}</div><table><thead><tr><th>Ativo/Protocolo</th><th style="text-align:center">Qtd</th><th style="text-align:right">Valor</th></tr></thead><tbody>${rows}</tbody></table><div class="tl g"><span>TOTAL</span><span>${tc>0?f(tp):'sob consulta'}</span></div><div style="margin-top:16px;font-size:11px;color:#80868b">Válido 30 dias. PHD do Brasil Rev.Fev/2026 + Formédica Ed.2023.11. ANVISA RDC 67/2007.</div><div class="pa"><button class="bp" onclick="window.print()">Imprimir</button><button class="bs" onclick="cP(null)">Fechar</button></div>`;
document.getElementById('pO').classList.add('show')}
function cP(e){if(!e||e.target===document.getElementById('pO'))document.getElementById('pO').classList.remove('show')}

document.getElementById('sI').addEventListener('input',rCat);
document.getElementById('mI').addEventListener('input',rC);
document.getElementById('bD').valueAsDate=new Date();
rT(['ativos','vitaminas','outros','protocolos']);rCat();
</script>
