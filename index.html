<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Orçamento Soroterapia — Palmiros & Bella Derm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Fraunces:ital,opsz,wght@0,9..144,600..800;1,9..144,400&display=swap" rel="stylesheet">
<style>
:root{--navy:#0f1b2d;--gold:#b8934e;--gold-light:#e2cfa0;--gold-glow:rgba(184,147,78,.15);--cream:#faf8f5;--cream-dark:#f2efe8;--white:#fff;--border:#e4e0d8;--border-light:#f0ece4;--text:#1c1a28;--text-sec:#6b6880;--text-dim:#a09dab;--phd:#2255a0;--phd-bg:#edf2fc;--fm:#b83d35;--fm-bg:#fdf0ee;--orange:#c07318;--orange-bg:#fdf3e2;--r:10px;--rl:14px;--rxl:18px;--s:0 1px 3px rgba(15,27,45,.05);--sl:0 4px 20px rgba(15,27,45,.07);--sxl:0 12px 40px rgba(15,27,45,.12);--ease:.22s cubic-bezier(.4,0,.2,1)}
*{margin:0;padding:0;box-sizing:border-box}html{-webkit-text-size-adjust:100%}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--cream);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.hdr{background:var(--navy);color:#fff;height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100}
.hdr::after{content:'';position:absolute;bottom:-8px;left:0;right:0;height:8px;background:linear-gradient(to bottom,rgba(15,27,45,.08),transparent);pointer-events:none}
.hdr-left{display:flex;align-items:center;gap:14px}
.hdr-mark{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:800;font-size:17px;color:var(--navy);flex-shrink:0}
.hdr h1{font-size:15px;font-weight:600;letter-spacing:-.02em;line-height:1.2}
.hdr-sub{font-size:10px;opacity:.45;font-weight:400;margin-top:1px}
.hdr-clinic{font-size:9px;text-transform:uppercase;letter-spacing:1px;opacity:.4;text-align:right;line-height:1.6;font-weight:500}
.pbar{background:var(--white);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;gap:12px;flex-wrap:wrap;align-items:end}
.fg{display:flex;flex-direction:column;gap:5px;flex:1;min-width:130px}.fg-sm{max-width:155px}
.fg label{font-size:9px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.fg input,.fg select{border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:14px;font-family:inherit;color:var(--text);background:var(--white);transition:var(--ease);-webkit-appearance:none}
.fg select{background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%239e9bab' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;padding-right:32px}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}
.fg input::placeholder{color:var(--text-dim)}
.main{max-width:1320px;margin:0 auto;padding:20px;display:grid;grid-template-columns:1fr 400px;gap:20px;min-height:calc(100vh - 62px - 67px)}
@media(max-width:1040px){.main{grid-template-columns:1fr;padding:12px}.cart-wrap{position:relative!important;top:auto!important}}
.card{background:var(--white);border-radius:var(--rl);box-shadow:var(--s);overflow:hidden;border:1px solid var(--border-light)}
.ch{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-light)}
.ch h2{font-size:14px;font-weight:700;color:var(--navy)}.badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--gold-glow);color:var(--gold)}
.sup-tabs{display:flex;background:var(--cream-dark)}
.sup-tab{flex:1;padding:11px 16px;font-size:12px;font-weight:700;text-align:center;cursor:pointer;color:var(--text-dim);border-bottom:3px solid transparent;transition:var(--ease);user-select:none;-webkit-tap-highlight-color:transparent}
.sup-tab:hover{color:var(--text)}.sup-tab.a-phd{color:var(--phd);background:var(--phd-bg);border-bottom-color:var(--phd)}.sup-tab.a-fm{color:var(--fm);background:var(--fm-bg);border-bottom-color:var(--fm)}
.sup-tab.a-id{color:#2a7a2a;background:#e8f5ee;border-bottom-color:#2a7a2a}
.sup-tab.a-ht{color:#8b5e34;background:#fdf3e8;border-bottom-color:#b8934e}
.stabs{display:flex;padding:0 12px;border-bottom:1px solid var(--border-light);overflow-x:auto;scrollbar-width:none;gap:2px}.stabs::-webkit-scrollbar{display:none}
.stab{padding:10px 14px;font-size:11px;font-weight:500;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:var(--ease);user-select:none;-webkit-tap-highlight-color:transparent}
.stab:hover{color:var(--text)}.stab.on{color:var(--phd);border-bottom-color:var(--phd);font-weight:700}
.cpills{display:flex;padding:10px 12px;gap:6px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border-light);background:var(--cream)}.cpills::-webkit-scrollbar{display:none}
.cpill{padding:6px 14px;font-size:11px;font-weight:600;border-radius:20px;border:1.5px solid var(--border);background:var(--white);color:var(--text-sec);cursor:pointer;white-space:nowrap;transition:var(--ease);user-select:none;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;gap:5px}
.cpill:hover{border-color:var(--fm);color:var(--fm)}.cpill.on{background:var(--fm);color:#fff;border-color:var(--fm);box-shadow:0 2px 8px rgba(184,61,53,.2)}
.cpill .cc{font-size:9px;opacity:.65;font-weight:700}.cpill .ico{font-size:13px}
.sbox{padding:10px 16px;border-bottom:1px solid var(--border-light);position:relative}
.sbox svg{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none}
.sbox input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px 10px 38px;font-size:13px;font-family:inherit;color:var(--text);transition:var(--ease)}
.sbox input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}.sbox input::placeholder{color:var(--text-dim)}
.vwarn{display:none;padding:8px 16px;background:var(--orange-bg);border-bottom:1px solid #f0dfc0;font-size:11px;color:var(--orange);font-weight:600;align-items:center;gap:6px}.vwarn.on{display:flex}
.clist{max-height:520px;overflow-y:auto;overscroll-behavior:contain}.clist::-webkit-scrollbar{width:4px}.clist::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.ci{display:grid;grid-template-columns:1fr auto auto;align-items:center;padding:12px 16px;gap:12px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:background var(--ease);-webkit-tap-highlight-color:transparent}
.ci:hover{background:var(--cream)}.ci:active{background:var(--cream-dark)}
.ci-n{font-size:13px;font-weight:500;line-height:1.35}.ci-d{font-size:10.5px;color:var(--text-dim);margin-top:2px;line-height:1.3}
.ci-via{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:var(--cream-dark);color:var(--text-sec);margin-right:4px}
.ci-kit{font-size:9.5px;font-weight:700;color:var(--fm);background:var(--fm-bg);padding:2px 7px;border-radius:4px;display:inline-block;margin-right:5px}
.ci-pr{font-size:14px;font-weight:700;color:var(--navy);white-space:nowrap;text-align:right}.ci-un{font-size:10px;color:var(--text-dim);text-align:right}
.ci-dim{opacity:.35;pointer-events:none}
.abtn{width:38px;height:38px;border:none;border-radius:var(--r);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:var(--ease);font-weight:300;-webkit-tap-highlight-color:transparent;line-height:1}
.abtn-p{background:var(--phd);color:#fff}.abtn-p:hover{background:#1a3d6d}.abtn-p:active{transform:scale(.9)}
.abtn-f{background:var(--fm);color:#fff}.abtn-f:hover{background:#8c2f28}.abtn-f:active{transform:scale(.9)}
.nores{padding:40px 20px;text-align:center;color:var(--text-dim);font-size:13px}
.cart-wrap{position:sticky;top:82px;align-self:start}
.cart-empty{padding:48px 24px;text-align:center;color:var(--text-dim)}
.cart-empty-ico{width:56px;height:56px;background:var(--gold-glow);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:24px}
.cart-empty p{font-size:13px;line-height:1.5}.cart-empty .hint{font-size:11px;margin-top:4px}
.crt-list{padding:4px 0;max-height:340px;overflow-y:auto;overscroll-behavior:contain}.crt-list::-webkit-scrollbar{width:4px}.crt-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.crt-i{display:grid;grid-template-columns:1fr auto auto auto;align-items:center;padding:10px 16px;gap:10px;border-bottom:1px solid var(--border-light);animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.crt-n{font-size:12px;font-weight:600;line-height:1.3}.crt-o{font-size:8px;font-weight:800;padding:1px 5px;border-radius:3px;margin-left:5px;vertical-align:middle;letter-spacing:.5px}
.o-phd{background:var(--phd-bg);color:var(--phd)}.o-fm{background:var(--fm-bg);color:var(--fm)}
.crt-pr{font-weight:700;color:var(--navy);white-space:nowrap;font-size:12px}.crt-con{font-size:11px;color:var(--fm);font-weight:600;font-style:italic}
.qctl{display:flex;align-items:center;gap:2px;background:var(--cream-dark);border-radius:6px;padding:2px}
.qbtn{width:26px;height:26px;border:none;background:var(--white);border-radius:5px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--text-sec);font-weight:700;transition:var(--ease);-webkit-tap-highlight-color:transparent}
.qbtn:hover{background:var(--border-light)}.qbtn:active{transform:scale(.9)}
.qval{width:26px;text-align:center;font-weight:700;font-size:13px}
.rbtn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;padding:4px;border-radius:4px;transition:var(--ease);-webkit-tap-highlight-color:transparent;line-height:1}
.rbtn:hover{background:var(--fm-bg);color:var(--fm)}
.tots{padding:14px 20px;border-top:2px solid var(--border);background:var(--cream)}
.mrow{display:flex;align-items:center;gap:8px;padding:8px 0;margin-bottom:6px;border-bottom:1px solid var(--border-light)}
.mrow label{font-size:11px;font-weight:600;color:var(--text-sec)}
.mrow input{width:64px;border:1.5px solid var(--border);border-radius:6px;padding:5px 8px;font-size:13px;text-align:center;font-family:inherit;transition:var(--ease)}
.mrow input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 2px var(--gold-glow)}
.trow{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px;color:var(--text-sec)}.trow span:last-child{font-weight:600;color:var(--text)}
.trow.big{font-size:18px;font-weight:800;color:var(--navy);padding-top:10px;margin-top:8px;border-top:2px solid var(--navy)}.trow.big span{color:var(--navy)}
.trow.vol span:last-child{color:var(--text-sec);font-weight:600}
.acts{padding:12px 16px;display:flex;gap:8px}
.btn{border:none;border-radius:8px;padding:12px 16px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:var(--ease);display:flex;align-items:center;justify-content:center;gap:7px;-webkit-tap-highlight-color:transparent}.btn:active{transform:scale(.97)}
.btn-main{flex:1;background:var(--navy);color:#fff}.btn-main:hover{background:#1a2d4a}.btn-main:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-wa{background:#25d366;color:#fff;padding:12px 14px}.btn-wa:hover{background:#1fb855}
.btn-sec{background:var(--white);color:var(--text-sec);border:1.5px solid var(--border)}.btn-sec:hover{background:var(--cream)}
.mo{display:none;position:fixed;inset:0;background:rgba(15,27,45,.45);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:1000;justify-content:center;align-items:center;padding:20px}.mo.show{display:flex}
.mc{background:#fff;width:100%;max-width:660px;max-height:90vh;overflow-y:auto;border-radius:var(--rxl);box-shadow:var(--sxl)}
.inv{padding:44px}
.inv-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;padding-bottom:20px;border-bottom:3px solid var(--navy)}
.inv-brand .inv-mark{width:44px;height:44px;background:var(--navy);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:800;font-size:22px;color:var(--gold);margin-bottom:10px}
.inv-brand h3{font-family:'Fraunces',serif;font-size:22px;color:var(--navy);font-weight:700;letter-spacing:-.02em}
.inv-brand .inv-sub{font-size:11px;color:var(--text-sec);margin-top:2px}
.inv-meta{text-align:right;font-size:11px;color:var(--text-sec);line-height:1.8}.inv-meta strong{color:var(--text);font-weight:600}
.inv-patient{background:var(--cream);border-radius:var(--r);padding:16px 20px;margin-bottom:28px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ip-l{font-size:9px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}.ip-v{font-size:13px;font-weight:600}
.inv table{width:100%;border-collapse:collapse;margin-bottom:24px}
.inv th{text-align:left;padding:10px 14px;background:var(--navy);color:#fff;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.inv th:first-child{border-radius:6px 0 0 0}.inv th:last-child{border-radius:0 6px 0 0}
.inv td{padding:10px 14px;border-bottom:1px solid var(--border-light);font-size:12px}.inv tr:last-child td{border-bottom:none}
.inv-tag{font-size:8px;font-weight:800;padding:1px 5px;border-radius:3px;margin-left:5px;vertical-align:middle}
.inv-total{display:flex;justify-content:space-between;align-items:center;padding:18px 0;border-top:3px solid var(--navy);margin-top:4px}
.inv-total .it-l{font-size:13px;font-weight:700;color:var(--text-sec);text-transform:uppercase;letter-spacing:1.5px}
.inv-total .it-v{font-family:'Fraunces',serif;font-size:32px;font-weight:700;color:var(--navy)}
.inv-foot{margin-top:28px;padding-top:16px;border-top:1px solid var(--border-light);font-size:9px;color:var(--text-dim);line-height:1.7}
.inv-acts{display:flex;gap:8px;padding:0 44px 28px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:12px 24px;border-radius:var(--r);font-size:13px;font-weight:600;box-shadow:var(--sxl);z-index:2000;opacity:0;transition:all .35s cubic-bezier(.4,0,.2,1);pointer-events:none;white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:600px){.hdr{padding:0 16px;height:56px}.hdr h1{font-size:14px}.hdr-clinic{display:none}.pbar{padding:12px 16px;gap:10px}.fg-sm{max-width:none}.main{padding:10px;gap:12px}.inv{padding:24px}.inv-acts{padding:0 24px 20px}.inv-hdr{flex-direction:column;gap:14px}.inv-meta{text-align:left}.inv-patient{grid-template-columns:1fr}}
@media print{body *{visibility:hidden}.mo,.mo *{visibility:visible}.mo{display:flex!important;position:absolute;top:0;left:0;background:#fff;padding:0}.mc{box-shadow:none;border-radius:0;max-height:none;max-width:none;width:100%}.inv-acts{display:none!important}.inv{padding:28px}}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-left"><div class="hdr-mark">P</div><div><h1>Orçamento de Soroterapia</h1><div class="hdr-sub">PHD do Brasil · Formédica</div></div></div><div class="hdr-clinic">Clínica Palmiros<br>Bella Derm</div></div>
<div class="pbar">
<div class="fg"><label>Paciente</label><input type="text" id="pN" placeholder="Nome completo do paciente" autocomplete="off"></div>
<div class="fg fg-sm"><label>Data</label><input type="date" id="bD"></div>
<div class="fg fg-sm"><label>Clínica</label><select id="cS"><option value="Clínica Palmiros">Clínica Palmiros</option><option value="Bella Derm">Bella Derm</option></select></div>
<div class="fg fg-sm"><label>Via de Administração</label><select id="vS"><option value="EV">EV (Endovenoso)</option><option value="IM">IM (Intramuscular)</option><option value="SC">SC (Subcutâneo)</option><option value="ID">ID (Intradérmico)</option></select></div>
</div>
<div class="main">
<div class="card">
<div class="ch"><h2>Catálogo</h2><span class="badge" id="iC">0</span></div>
<div class="sup-tabs"><div class="sup-tab a-phd" id="tP" onclick="setS('phd')">PHD do Brasil</div><div class="sup-tab" id="tF" onclick="setS('fm')">FM Injetáveis</div><div class="sup-tab" id="tID" onclick="setS('id')">FM Intradermo</div><div class="sup-tab" id="tHT" onclick="setS('ht')">Health Tech</div></div>
<div class="stabs" id="sT"></div>
<div class="cpills" id="cP" style="display:none"></div>
    <div class="cpills" id="cPID" style="display:none"></div>
    <div class="stabs" id="sHT" style="display:none"></div>
    <div class="cpills" id="cPHT" style="display:none"></div>
<div class="vwarn" id="vW"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 1L1 13h12L7 1zM7 5v3M7 10.5v.5"/></svg><span id="vWT"></span></div>
<div class="sbox"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="5"/><path d="M10 10l3.5 3.5"/></svg><input type="text" id="sI" placeholder="Buscar por nome, código ou composição…"></div>
<div class="clist" id="cL"></div>
</div>
<div class="card cart-wrap">
<div class="ch"><h2>Composição</h2><span class="badge" id="cC">0</span></div>
<div class="crt-list" id="cLi"><div class="cart-empty"><div class="cart-empty-ico">💉</div><p>Nenhum item selecionado</p><p class="hint">Selecione ativos ou protocolos no catálogo</p></div></div>
<div class="tots">
<div class="mrow"><label>Margem</label><input type="number" id="mI" value="300" min="0" max="1000" step="10"><label>%</label></div>
<div class="trow"><span>Custo</span><span id="tCo">R$ 0,00</span></div>
<div class="trow"><span>Itens</span><span id="tA">0</span></div>
<div class="trow vol" id="volRow" style="display:none"><span>Volume total</span><span id="tVol">0 mL</span></div>
<div class="trow big"><span>Valor Paciente</span><span id="tPr">R$ 0,00</span></div>
</div>
<div class="acts">
<button class="btn btn-main" id="bG" onclick="showInv()" disabled><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 1v13M13 1v13M1 5h14M1 9h14"/></svg>Gerar Orçamento</button>
<button class="btn btn-wa" onclick="shareWA()" title="WhatsApp"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.47 14.38c-.3-.15-1.76-.87-2.03-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.07-.3-.15-1.26-.46-2.4-1.48-.89-.79-1.49-1.77-1.66-2.07-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.67-1.61-.92-2.2-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.07-.79.37-.27.3-1.04 1.01-1.04 2.47 0 1.46 1.06 2.87 1.21 3.07.15.2 2.09 3.19 5.06 4.47.71.31 1.26.49 1.69.63.71.23 1.35.2 1.86.12.57-.09 1.76-.72 2.01-1.41.25-.7.25-1.29.17-1.41-.07-.13-.27-.2-.57-.35zM12.05 21.5c-1.77 0-3.5-.47-5.02-1.37l-.36-.21-3.73.98.99-3.63-.24-.37A9.42 9.42 0 0 1 2.5 12.05c0-5.24 4.27-9.5 9.52-9.5 2.54 0 4.93.99 6.72 2.79a9.47 9.47 0 0 1 2.78 6.74c0 5.24-4.27 9.5-9.47 9.42z"/></svg></button>
<button class="btn btn-sec" onclick="cart=[];rC()">Limpar</button>
</div></div></div>
<div class="mo" id="mO" onclick="clM(event)"><div class="mc"><div class="inv" id="iCo"></div><div class="inv-acts" id="iA"></div></div></div>
<div class="toast" id="toast"></div>
<script>
const $=id=>document.getElementById(id);
const M=v=>'R$ '+v.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
